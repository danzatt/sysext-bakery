name: Import Flatcar SDK image and push to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  import-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set variables
        shell: bash
        run: |
          set -euo pipefail
          git -C /tmp clone https://github.com/flatcar/scripts --depth=1
          cd /tmp/scripts
          source sdk_lib/sdk_container_common.sh
          source ci-automation/ci_automation_common.sh
          FLATCAR_VERSION=$(vernum_to_docker_image_version $(get_version_from_versionfile))
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "FLATCAR_VERSION=${FLATCAR_VERSION}" >> $GITHUB_ENV
          echo "SRC_URL=https://bincache.flatcar-linux.net/containers/${FLATCAR_VERSION}/flatcar-sdk-all-${FLATCAR_VERSION}.tar.zst" >> $GITHUB_ENV
          echo "TARGET_REPO=ghcr.io/${OWNER_LOWER}/flatcar-sdk-all-nightly" >> $GITHUB_ENV

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Skip if target tag already exists in GHCR
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          skip='false'
          if docker manifest inspect "${TARGET_REPO}:${FLATCAR_VERSION}" > /dev/null 2>&1; then
            echo "Image already exists in GHCR: ${TARGET_REPO}:${FLATCAR_VERSION} — skipping import/push."
            skip='true'
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - name: Download and import SDK
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt update -qq && sudo apt install -yqq zstd

          echo "Importing SDK tarball from: $SRC_URL"
          OUT=$(curl --fail --location --progress-bar "$SRC_URL"  | pzstd -d -c | docker load)
          echo "$OUT"

          # Parsing docker output: "Loaded image: <ref>"
          LOADED_REF=$(echo "$OUT" | sed -n 's/^Loaded image: //p' | head -n1)
          if [ -z "${LOADED_REF}" ]; then
            echo "Failed to parse loaded image name from docker load output" >&2
            exit 1
          fi
          echo "Loaded image: $LOADED_REF"

          docker tag "$LOADED_REF" "${TARGET_REPO}:${FLATCAR_VERSION}"
          docker tag "$LOADED_REF" "${TARGET_REPO}:latest"

          docker images "${TARGET_REPO}" --format '{{.Repository}}:{{.Tag}}'

          docker push "${TARGET_REPO}:${FLATCAR_VERSION}"
          docker push "${TARGET_REPO}:latest"
