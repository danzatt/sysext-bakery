name: Import Flatcar SDK image and push to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  import-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set variables
        shell: bash
        run: |
          set -euo pipefail
          git -C /tmp clone https://github.com/flatcar/scripts --depth=1
          cd /tmp/scripts
          source sdk_lib/sdk_container_common.sh
          source ci-automation/ci_automation_common.sh
          VERSION=$(vernum_to_docker_image_version $(get_version_from_versionfile))
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "OWNER_LOWER=${OWNER_LOWER}" >> $GITHUB_ENV
          echo "SRC_URL=https://bincache.flatcar-linux.net/containers/${VERSION}/flatcar-sdk-all-${VERSION}.tar.zst" >> $GITHUB_ENV
          echo "TARGET_REPO=ghcr.io/${OWNER_LOWER}/flatcar-sdk-all-nightly" >> $GITHUB_ENV

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Skip if target tag already exists in GHCR
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if docker manifest inspect "${TARGET_REPO}:${VERSION}" > /dev/null 2>&1; then
            echo "Image already exists in GHCR: ${TARGET_REPO}:${VERSION} — skipping import/push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and import SDK
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        id: load
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd

          echo "Importing SDK tarball from: $SRC_URL"
          OUT=$(curl --fail --location --progress-bar "$SRC_URL"  | zstdcat | docker load)
          echo "$OUT"

          # Parsing docker output: "Loaded image: <ref>"
          LOADED=$(echo "$OUT" | sed -n 's/^Loaded image: //p' | head -n1)
          if [ -z "${LOADED}" ]; then
            echo "Failed to parse loaded image name from docker load output" >&2
            exit 1
          fi
          echo "Loaded image: $LOADED"
          echo "loaded_ref=$LOADED" >> "$GITHUB_OUTPUT"

      - name: Tag image (version and latest)
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euxo pipefail
          docker tag "${{ steps.load.outputs.loaded_ref }}" "${TARGET_REPO}:${VERSION}"
          docker tag "${{ steps.load.outputs.loaded_ref }}" "${TARGET_REPO}:latest"

          docker images "${TARGET_REPO}" --format '{{.Repository}}:{{.Tag}}' || true

      - name: Push tags to GHCR
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euxo pipefail
          docker push "${TARGET_REPO}:${VERSION}"
          docker push "${TARGET_REPO}:latest"

      - name: Done (no-op)
        if: steps.guard.outputs.skip == 'true'
        run: echo "Nothing to do — requested version already present in GHCR."
