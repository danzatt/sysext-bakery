name: Build and Push Docker Image to GHCR

on:
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

  # Schedules the workflow to run at 03:00 UTC on every Sunday.
  schedule:
    - cron: "0 3 * * 0"

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    # Sets the permissions for the GITHUB_TOKEN to allow pushing to GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Extract metadata for Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/flatcar-sdk-docker

      - name: Pull SDK from bincache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq axel lbzip2
          cd /tmp
          axel -n20 -p 'https://bincache.flatcar-linux.net/containers/9999.0.3-danzatt-pkcs11-workload-identity/flatcar-sdk-all-9999.0.3-danzatt-pkcs11-workload-identity.tar.zst'
          pzstd -d -c flatcar-sdk-all-9999.0.3-danzatt-pkcs11-workload-identity.tar.zst | docker load

      - name: Build and push Flatcar SDK image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: lib/Dockerfile.flatcar-sdk-docker
          push: true
          # The tags and labels are generated by the metadata-action in the previous step.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

