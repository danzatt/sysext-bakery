name: Update SDK nightly image with unmerged PR

on:
  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    # Sets the permissions for the GITHUB_TOKEN to allow pushing to GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Extract metadata for Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/flatcar-sdk-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Flatcar SDK image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: lib/Dockerfile.flatcar-sdk-docker
          push: true
          # The tags and labels are generated by the metadata-action in the previous step.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          allow: security.insecure
